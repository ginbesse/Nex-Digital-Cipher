<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>example.com | Smart Deployment</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">Target domain: example.com</p>
      <h1>example.com</h1>
      <p class="subtitle">This generated site is configured for 2500 users.</p>
      <a class="cta" href="https://example.com">Open URL</a>
    </div>
  </header>

  <main class="grid">
    <section class="card">
      <h2>Traffic Profile</h2>
      <p>Expected user volume: 2500</p>
    </section>
    <section class="card">
      <h2>Deployment Target</h2>
      <p>URL: https://example.com</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
